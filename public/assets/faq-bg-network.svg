    <line x1="750" y1="110" x2="730" y2="530"/>
    <line x1="920" y1="190" x2="900" y2="460"/>
    <line x1="1080" y1="80" x2="1070" y2="540"/>
    <line x1="1260" y1="170" x2="1240" y2="470"/>
