    <circle cx="1260" cy="170" r="9"  fill="#00A3FF" opacity="0.10"/>
    <circle cx="1260" cy="170" r="5.5" fill="#38bdf8" opacity="0.9"/>
    <!-- Hub 4 - purple (mid-left) -->
    <circle cx="480" cy="340" r="18"  fill="#7c3aed" opacity="0.06"/>
    <circle cx="480" cy="340" r="11"  fill="#7c3aed" opacity="0.10"/>
    <circle cx="480" cy="340" r="6.5" fill="#a855f7" opacity="0.9"/>
