    <circle cx="340" cy="420" r="3.5" fill="#7c3aed" opacity="0.85"/>
    <circle cx="520" cy="160" r="3"   fill="#a855f7" opacity="0.8"/>
    <circle cx="860" cy="580" r="4"   fill="#7c3aed" opacity="0.9"/>
    <circle cx="1140" cy="450" r="3"  fill="#a855f7" opacity="0.8"/>
    <circle cx="160" cy="760" r="3.5" fill="#7c3aed" opacity="0.85"/>
    <circle cx="680" cy="800" r="3"   fill="#a855f7" opacity="0.8"/>
    <circle cx="1020" cy="820" r="4"  fill="#7c3aed" opacity="0.9"/>
    <circle cx="1320" cy="780" r="3"  fill="#a855f7" opacity="0.85"/>
  </g>

  <!-- ── Large hub nodes with halos ── -->
  <g filter="url(#glow-lg)">
    <!-- Hub 1 - blue (left) -->
    <circle cx="240" cy="160" r="14"  fill="#00A3FF" opacity="0.06"/>
    <circle cx="240" cy="160" r="9"   fill="#00A3FF" opacity="0.10"/>
