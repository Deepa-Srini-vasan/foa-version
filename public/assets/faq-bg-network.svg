    <circle cx="900" cy="460" r="12"  fill="#00A3FF" opacity="0.10"/>
    <circle cx="900" cy="460" r="7"   fill="#38bdf8" opacity="0.9"/>
    <!-- Hub 6 - purple (bottom-center) -->
    <circle cx="610" cy="620" r="16"  fill="#7c3aed" opacity="0.06"/>
    <circle cx="610" cy="620" r="10"  fill="#7c3aed" opacity="0.10"/>
    <circle cx="610" cy="620" r="6"   fill="#a855f7" opacity="0.9"/>
    <!-- Hub 7 - blue (right-mid) -->
    <circle cx="1180" cy="370" r="14" fill="#00A3FF" opacity="0.06"/>
    <circle cx="1180" cy="370" r="9"  fill="#00A3FF" opacity="0.10"/>
    <circle cx="1180" cy="370" r="5.5" fill="#38bdf8" opacity="0.9"/>
