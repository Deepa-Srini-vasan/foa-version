    <circle cx="390" cy="510" r="3.5" fill="#00A3FF" opacity="0.85"/>
    <circle cx="560" cy="450" r="5"   fill="#38bdf8" opacity="0.8"/>
    <circle cx="730" cy="530" r="3"   fill="#00A3FF" opacity="0.9"/>
    <circle cx="900" cy="460" r="4"   fill="#38bdf8" opacity="0.85"/>
    <circle cx="1070" cy="540" r="3.5" fill="#00A3FF" opacity="0.8"/>
    <circle cx="1240" cy="470" r="4"  fill="#38bdf8" opacity="0.9"/>
    <circle cx="1410" cy="530" r="3"  fill="#00A3FF" opacity="0.85"/>

    <circle cx="100" cy="650" r="3.5" fill="#38bdf8" opacity="0.8"/>
    <circle cx="270" cy="600" r="4"   fill="#00A3FF" opacity="0.9"/>
    <circle cx="440" cy="680" r="3"   fill="#38bdf8" opacity="0.85"/>
    <circle cx="610" cy="620" r="5"   fill="#00A3FF" opacity="0.8"/>
    <circle cx="780" cy="700" r="3.5" fill="#38bdf8" opacity="0.9"/>
    <circle cx="950" cy="640" r="4"   fill="#00A3FF" opacity="0.85"/>
    <circle cx="1120" cy="720" r="3"  fill="#38bdf8" opacity="0.8"/>
    <circle cx="1290" cy="650" r="4.5" fill="#00A3FF" opacity="0.9"/>
    <circle cx="1420" cy="700" r="3"  fill="#38bdf8" opacity="0.85"/>
  </g>

  <!-- Purple accent nodes -->
