<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ng1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00A3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient background glows -->
  <ellipse cx="180" cy="220" rx="340" ry="260" fill="url(#ng1)" opacity="0.12"/>
  <ellipse cx="1260" cy="650" rx="300" ry="240" fill="url(#ng2)" opacity="0.10"/>
  <ellipse cx="720" cy="480" rx="280" ry="200" fill="url(#ng1)" opacity="0.07"/>
  <ellipse cx="400" cy="700" rx="200" ry="160" fill="url(#ng2)" opacity="0.08"/>
  <ellipse cx="1100" cy="150" rx="220" ry="180" fill="url(#ng3)" opacity="0.09"/>

  <!-- ── Network connections (thin lines) ── -->
